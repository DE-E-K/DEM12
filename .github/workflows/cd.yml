name: CD — Deploy to Test Environment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy stack on test runner
    runs-on: ubuntu-latest  # acts as the test environment
    steps:
      - uses: actions/checkout@v4

      # === Build and push images to Docker Hub =====================
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & push data-generator image
        uses: docker/build-push-action@v5
        with:
          context: ./data-generator
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/data-platform-data-generator:latest

      # === Stand up the full stack on the runner ==================
      - name: Create .env from GitHub Secrets
        run: |
          cat > .env <<EOF
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_DB=sales
          POSTGRES_USER=sales_user
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          AIRFLOW_DB_PASSWORD=${{ secrets.AIRFLOW_DB_PASSWORD }}
          AIRFLOW__CORE__EXECUTOR=LocalExecutor
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:${{ secrets.AIRFLOW_DB_PASSWORD }}@postgres:5432/airflow
          AIRFLOW__CORE__FERNET_KEY=${{ secrets.AIRFLOW__CORE__FERNET_KEY }}
          AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=false
          AIRFLOW__CORE__LOAD_EXAMPLES=false
          AIRFLOW__WEBSERVER__SECRET_KEY=${{ secrets.AIRFLOW__WEBSERVER__SECRET_KEY }}
          AIRFLOW_ADMIN_USERNAME=admin
          AIRFLOW_ADMIN_PASSWORD=${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
          AIRFLOW_ADMIN_EMAIL=admin@example.com
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_PASSWORD }}
          MINIO_ENDPOINT=http://minio:9000
          MINIO_RAW_BUCKET=raw-data
          MINIO_PROCESSED_BUCKET=processed-data
          MB_DB_TYPE=postgres
          MB_DB_DBNAME=metabase
          MB_DB_PORT=5432
          MB_DB_USER=metabase_user
          MB_DB_PASS=${{ secrets.MB_DB_PASS }}
          MB_DB_HOST=postgres
          GENERATOR_NUM_CUSTOMERS=50
          GENERATOR_NUM_TRANSACTIONS=200
          GENERATOR_SEED=42
          EOF

      - name: Start all services
        run: |
          # 1) Start infra + one-shot init containers (dependencies auto-start)
          docker compose up -d postgres minio minio-init airflow-init

          # 2) Poll until each init container finishes, then check its exit code.
          #    minio-init won't start until minio is healthy (per depends_on),
          #    so we poll rather than using docker wait (which races on fast exits).
          for container in platform_minio_init platform_airflow_init; do
            echo "Waiting for $container to finish..."
            for i in $(seq 1 60); do
              STATUS=$(docker inspect --format='{{.State.Status}}' "$container" 2>/dev/null || echo "missing")
              if [ "$STATUS" = "exited" ]; then
                break
              fi
              sleep 5
            done
            STATUS=$(docker inspect --format='{{.State.Status}}' "$container" 2>/dev/null || echo "missing")
            if [ "$STATUS" != "exited" ]; then
              echo "FAIL: $container did not finish within timeout — dumping logs:"
              docker logs "$container"
              exit 1
            fi
            EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' "$container")
            echo "$container exited with code $EXIT_CODE"
            if [ "$EXIT_CODE" != "0" ]; then
              echo "FAIL: $container did not complete successfully — dumping logs:"
              docker logs "$container"
              exit 1
            fi
          done

          # 3) Start and wait for long-running services to become healthy
          docker compose up -d --wait \
            postgres minio \
            airflow-webserver airflow-scheduler \
            metabase
        timeout-minutes: 10

      - name: Health check — all containers healthy
        run: |
          for service in platform_postgres platform_minio platform_airflow_webserver platform_airflow_scheduler platform_metabase; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' $service 2>/dev/null || echo "unknown")
            echo "$service: $STATUS"
            [ "$STATUS" = "healthy" ] || { echo "FAIL: $service not healthy"; exit 1; }
          done

      - name: Tear down
        if: always()
        run: docker compose down -v

